<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>掼蛋记分器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; padding: 20px; }
    h1 { text-align: center; margin-bottom: 20px; font-size: 24px; }
    
    .lang-bar { position: fixed; top: 15px; left: 20px; display: flex; gap: 8px; z-index: 100; }
    .lang-btn { padding: 6px 12px; font-size: 13px; border: 1px solid #475569; border-radius: 6px; background: #1e293b; color: #94a3b8; cursor: pointer; }
    .lang-btn.active { background: #6366f1; color: #fff; border-color: #6366f1; }
    
    .timer-section { text-align: center; margin-bottom: 30px; }
    .timer-display { font-size: 48px; font-weight: bold; font-variant-numeric: tabular-nums; letter-spacing: 4px; }
    .timer-buttons { margin-top: 12px; display: flex; gap: 10px; justify-content: center; }
    .btn { padding: 8px 20px; font-size: 14px; border: none; border-radius: 8px; cursor: pointer; }
    .btn-start { background: #4ade80; color: #000; }
    .btn-pause { background: #facc15; color: #000; display: none; }
    .btn-reset { background: #6b7280; color: #fff; }
    
    .score-area { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 500px; margin: 0 auto; }
    .team-card { background: #16213e; border-radius: 16px; padding: 20px; text-align: center; }
    .team-card.ns { border: 3px solid #60a5fa; }
    .team-card.ew { border: 3px solid #f97316; }
    .team-name { font-size: 18px; font-weight: bold; margin-bottom: 8px; }
    .ns .team-name { color: #60a5fa; }
    .ew .team-name { color: #f97316; }
    
    .score-block { margin-bottom: 15px; }
    .score-label { font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
    .score-value { font-size: 56px; font-weight: bold; height: 60px; display: flex; align-items: center; justify-content: center; }
    .card-suffix { font-size: 20px; vertical-align: super; margin-left: 1px; }
    .wins-block { border-top: 1px solid #334155; padding-top: 12px; }
    .wins-label { font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
    .wins-value { font-size: 32px; font-weight: bold; }
    
    .adjust-btns { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
    .adjust-btn { padding: 8px 14px; font-size: 14px; border: none; border-radius: 8px; cursor: pointer; background: #22c55e; color: #000; font-weight: bold; min-width: 44px; }
    .adjust-btn:hover { background: #4ade80; }
    .adjust-btn.sub { background: #ef4444; color: #fff; }
    .adjust-btn.win { background: #6366f1; color: #fff; }
    .adjust-btn.win:hover { background: #818cf8; }
    
    .reset-section { max-width: 500px; margin: 30px auto 0; text-align: center; }
    .reset-btn { padding: 10px 20px; font-size: 14px; border: none; border-radius: 8px; cursor: pointer; background: #6b7280; color: #fff; }
  </style>
</head>
<body>
  <div class="lang-bar">
    <button class="lang-btn active" onclick="setLang('zh')">中文</button>
    <button class="lang-btn" onclick="setLang('en')">English</button>
    <button class="lang-btn" onclick="setLang('ja')">日本語</button>
  </div>
  
  <h1 data-i18n="title">🃏 掼蛋记分器</h1>
  
  <div class="timer-section">
    <div class="timer-display" id="timerDisplay">00:00:00</div>
    <div class="timer-buttons">
      <button class="btn btn-start" id="btnStart" data-i18n="start">开始</button>
      <button class="btn btn-pause" id="btnPause" data-i18n="pause">暂停</button>
      <button class="btn btn-reset" id="btnReset" data-i18n="reset">重置</button>
    </div>
  </div>
  
  <div class="score-area">
    <div class="team-card ns">
      <div class="team-name" data-i18n="ns">北 / 南</div>
      <div class="score-block">
        <div class="score-label" data-i18n="currentScore">当前分数</div>
        <div class="score-value" id="nsScore">-</div>
      </div>
      <div class="wins-block">
        <div class="wins-label" data-i18n="wins">赢的局数</div>
        <div class="wins-value" id="nsWins">0</div>
      </div>
      <div class="adjust-btns">
        <button class="adjust-btn sub" onclick="adjust('ns', -1)">-1</button>
        <button class="adjust-btn" onclick="adjust('ns', 1)">+1</button>
        <button class="adjust-btn" onclick="adjust('ns', 2)">+2</button>
        <button class="adjust-btn" onclick="adjust('ns', 4)">+4</button>
        <button class="adjust-btn win" onclick="winMinus('ns')" data-i18n="winMinus">赢-1</button>
        <button class="adjust-btn win" onclick="win('ns')" data-i18n="win">赢</button>
      </div>
    </div>
    
    <div class="team-card ew">
      <div class="team-name" data-i18n="ew">东 / 西</div>
      <div class="score-block">
        <div class="score-label" data-i18n="currentScore">当前分数</div>
        <div class="score-value" id="ewScore">-</div>
      </div>
      <div class="wins-block">
        <div class="wins-label" data-i18n="wins">赢的局数</div>
        <div class="wins-value" id="ewWins">0</div>
      </div>
      <div class="adjust-btns">
        <button class="adjust-btn sub" onclick="adjust('ew', -1)">-1</button>
        <button class="adjust-btn" onclick="adjust('ew', 1)">+1</button>
        <button class="adjust-btn" onclick="adjust('ew', 2)">+2</button>
        <button class="adjust-btn" onclick="adjust('ew', 4)">+4</button>
        <button class="adjust-btn win" onclick="winMinus('ew')" data-i18n="winMinus">赢-1</button>
        <button class="adjust-btn win" onclick="win('ew')" data-i18n="win">赢</button>
      </div>
    </div>
  </div>
  
  <div class="reset-section">
    <button class="reset-btn" onclick="resetAll()" data-i18n="resetAll">全部重置</button>
  </div>

  <script>
    const i18n = {
      zh: {
        title: '🃏 掼蛋记分器',
        start: '开始',
        pause: '暂停',
        reset: '重置',
        ns: '北 / 南',
        ew: '东 / 西',
        currentScore: '当前分数',
        wins: '赢的局数',
        winMinus: '赢-1',
        win: '赢',
        resetAll: '全部重置'
      },
      en: {
        title: '🃏 GuanDan Score',
        start: 'Start',
        pause: 'Pause',
        reset: 'Reset',
        ns: 'N / S',
        ew: 'E / W',
        currentScore: 'Score',
        wins: 'Wins',
        winMinus: 'Win-1',
        win: 'Win',
        resetAll: 'Reset All'
      },
      ja: {
        title: '🃏 淮南スコア',
        start: '開始',
        pause: '一時停止',
        reset: 'リセット',
        ns: '北 / 南',
        ew: '東 / 西',
        currentScore: 'スコア',
        wins: '勝利数',
        winMinus: '勝利-1',
        win: '勝利',
        resetAll: '全てリセット'
      }
    };
    
    let currentLang = 'zh';
    
    function setLang(lang) {
      currentLang = lang;
      document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (i18n[lang][key]) {
          el.textContent = i18n[lang][key];
        }
      });
    }
    
    let secs = 0, timer = null, running = false;
    const display = document.getElementById('timerDisplay');
    
    function fmt(s) {
      return `${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor(s%3600/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
    }
    
    document.getElementById('btnStart').onclick = () => {
      if (!running) {
        running = true;
        timer = setInterval(() => { secs++; display.textContent = fmt(secs); }, 1000);
        document.getElementById('btnStart').style.display = 'none';
        document.getElementById('btnPause').style.display = 'inline-block';
      }
    };
    
    document.getElementById('btnPause').onclick = () => {
      clearInterval(timer);
      running = false;
      document.getElementById('btnStart').textContent = i18n[currentLang].start;
      document.getElementById('btnStart').style.display = 'inline-block';
      document.getElementById('btnPause').style.display = 'none';
    };
    
    document.getElementById('btnReset').onclick = () => {
      clearInterval(timer);
      running = false;
      secs = 0;
      display.textContent = '00:00:00';
      document.getElementById('btnStart').textContent = i18n[currentLang].start;
      document.getElementById('btnStart').style.display = 'inline-block';
      document.getElementById('btnPause').style.display = 'none';
    };
    
    let ns = 2, ew = 2, nsWins = 0, ewWins = 0;
    
    document.getElementById('nsScore').innerHTML = getCardLabel(ns);
    document.getElementById('ewScore').innerHTML = getCardLabel(ew);
    
    function getCardLabel(val) {
      if (val <= 10) return String(val);
      if (val === 11) return 'J';
      if (val === 12) return 'Q';
      if (val === 13) return 'K';
      if (val === 14) return 'A<span class="card-suffix">①</span>';
      if (val === 15) return 'A<span class="card-suffix">②</span>';
      if (val === 16) return 'A<span class="card-suffix">③</span>';
      return 'A<span class="card-suffix">③</span>';
    }
    
    function adjust(team, delta) {
      if (team === 'ns') {
        ns = Math.max(2, Math.min(16, ns + delta));
        document.getElementById('nsScore').innerHTML = ns === 0 ? '-' : getCardLabel(ns);
      } else {
        ew = Math.max(2, Math.min(16, ew + delta));
        document.getElementById('ewScore').innerHTML = ew === 0 ? '-' : getCardLabel(ew);
      }
    }
    
    function win(team) {
      if (team === 'ns') {
        nsWins++;
        document.getElementById('nsWins').textContent = nsWins;
        ns = 2;
        document.getElementById('nsScore').innerHTML = getCardLabel(ns);
      } else {
        ewWins++;
        document.getElementById('ewWins').textContent = ewWins;
        ew = 2;
        document.getElementById('ewScore').innerHTML = getCardLabel(ew);
      }
    }
    
    function winMinus(team) {
      if (team === 'ns') {
        nsWins = Math.max(0, nsWins - 1);
        document.getElementById('nsWins').textContent = nsWins;
      } else {
        ewWins = Math.max(0, ewWins - 1);
        document.getElementById('ewWins').textContent = ewWins;
      }
    }
    
    function resetAll() {
      if (confirm(currentLang === 'zh' ? '确认重置？' : currentLang === 'en' ? 'Confirm reset?' : 'リセットしますか？')) {
        ns = 2; ew = 2; nsWins = 0; ewWins = 0;
        document.getElementById('nsScore').innerHTML = getCardLabel(ns);
        document.getElementById('ewScore').innerHTML = getCardLabel(ew);
        document.getElementById('nsWins').textContent = '0';
        document.getElementById('ewWins').textContent = '0';
        document.getElementById('btnReset').click();
      }
    }
  </script>
</body>
</html>
